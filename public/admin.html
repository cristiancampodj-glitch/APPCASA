<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Panel Admin · Mi Casa</title>
<link rel="stylesheet" href="/styles.css" />
<style>
  body { background: var(--bg, #f5f7fb); }
  .admin-shell { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .admin-header { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
  .admin-header h1 { margin:0; font-size:24px; }
  .admin-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .admin-tabs button { padding:10px 16px; border-radius:10px; border:1px solid var(--border, #e2e8f0); background:#fff; cursor:pointer; font-weight:600; color:var(--text); }
  .admin-tabs button.active { background: var(--primary, #6366f1); color:#fff; border-color: var(--primary, #6366f1); }
  .admin-tabs .badge { display:inline-block; margin-left:6px; padding:0 8px; border-radius:999px; background:#ef4444; color:#fff; font-size:12px; }
  .admin-stats { display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:10px; margin-bottom:16px; }
  .admin-stat { background:#fff; padding:14px; border-radius:12px; border:1px solid var(--border, #e2e8f0); }
  .admin-stat .num { font-size:24px; font-weight:800; color: var(--primary, #6366f1); }
  .admin-stat .lbl { color: var(--text-muted, #64748b); font-size:13px; }
  .admin-search { display:flex; gap:8px; margin-bottom:12px; }
  .admin-search input { flex:1; padding:10px 14px; border-radius:10px; border:1px solid var(--border, #e2e8f0); font-size:15px; }
  .user-card { background:#fff; border:1px solid var(--border,#e2e8f0); border-radius:12px; padding:14px; margin-bottom:10px; }
  .user-card.pending { border-left: 4px solid #ef4444; }
  .user-card .top { display:flex; justify-content:space-between; align-items:start; gap:10px; flex-wrap:wrap; }
  .user-card .meta { color: var(--text-muted, #64748b); font-size:13px; }
  .user-card .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .pill { display:inline-block; padding:2px 10px; border-radius:999px; font-size:12px; font-weight:600; }
  .pill.owner   { background:#dbeafe; color:#1e40af; }
  .pill.tenant  { background:#dcfce7; color:#166534; }
  .pill.admin   { background:#fef3c7; color:#854d0e; }
  .pill.pending { background:#fee2e2; color:#991b1b; }
  .pill.inactive{ background:#e5e7eb; color:#374151; }
  .empty-msg { text-align:center; padding:40px; color: var(--text-muted, #64748b); }
  .login-box { max-width: 380px; margin: 80px auto; background:#fff; padding: 28px; border-radius: 14px; box-shadow: 0 6px 20px rgba(0,0,0,0.06); }
  .login-box h1 { margin:0 0 6px; font-size:22px; }
  .login-box p  { margin:0 0 18px; color: var(--text-muted, #64748b); }
  .login-box label { display:block; font-size:13px; font-weight:600; margin-bottom:4px; margin-top:10px; }
  .login-box input { width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border, #e2e8f0); font-size:15px; box-sizing:border-box; }
  .login-box button { width:100%; margin-top:18px; padding:12px; border-radius:10px; background: var(--primary, #6366f1); color:#fff; font-weight:700; border:0; cursor:pointer; font-size:16px; }
  .err { background:#fee2e2; color:#991b1b; padding:10px 12px; border-radius:10px; margin-top:10px; font-size:14px; display:none; }
  .err.show { display:block; }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:50; display:flex; align-items:center; justify-content:center; padding:20px; }
  .modal-card { background:#fff; border-radius:14px; padding:22px; max-width:480px; width:100%; max-height:90vh; overflow:auto; }
  .modal-card h3 { margin: 0 0 14px; }
  .modal-card label { display:block; font-size:13px; font-weight:600; margin:10px 0 4px; }
  .modal-card input, .modal-card select, .modal-card textarea { width:100%; padding:10px; border-radius:8px; border:1px solid var(--border, #e2e8f0); box-sizing:border-box; font-size:15px; }
  .row-btns { display:flex; gap:8px; margin-top:14px; }
  .btn { padding:10px 16px; border-radius:10px; border:0; cursor:pointer; font-weight:600; font-size:14px; }
  .btn.primary { background: var(--primary, #6366f1); color:#fff; }
  .btn.success { background: #16a34a; color:#fff; }
  .btn.danger  { background: #dc2626; color:#fff; }
  .btn.ghost   { background: #f1f5f9; color:#0f172a; }
  .toast-box { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#0f172a; color:#fff; padding:12px 18px; border-radius:10px; z-index:100; font-weight:600; }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="/admin.js"></script>
</body>
</html>
